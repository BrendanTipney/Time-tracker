<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1212" />
  <title>Time Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <h1 class="logo">⏱ <span>Time Tracker</span></h1>
      <p class="muted" id="auth-subtitle">Sign in to continue.</p>
      <form id="auth-form">
        <label>
          <span>Email</span>
          <input type="email" id="auth-email" required autocomplete="email" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="auth-password" required minlength="6" autocomplete="current-password" />
        </label>
        <label id="auth-name-field" class="hidden">
          <span>Display name</span>
          <input type="text" id="auth-name" autocomplete="nickname" />
        </label>
        <button type="submit" id="auth-submit" class="btn primary">Sign in</button>
        <p class="auth-toggle">
          <span id="auth-toggle-text">Don't have an account?</span>
          <a href="#" id="auth-toggle-link">Sign up</a>
        </p>
        <p id="auth-error" class="error hidden"></p>
      </form>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">⏱ <span>Time Tracker</span></div>
      <div class="user-chip">
        <button type="button" class="dot" id="user-dot" title="Change your color"></button>
        <span id="user-name">—</span>
        <button id="sign-out" class="btn ghost small">Sign out</button>
      </div>
    </header>

    <section class="timer-panel">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="project-row">
        <select id="project-select">
          <option value="">— select project —</option>
        </select>
        <button type="button" id="project-add" class="btn ghost small" title="New project">+ New</button>
      </div>
      <button id="timer-button" class="btn primary big">Start</button>
      <p id="timer-status" class="muted small"></p>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="calendar">Calendar</button>
      <button class="tab" data-tab="chart">Chart</button>
      <button class="tab" data-tab="export">Export</button>
    </nav>

    <main class="tab-content">
      <section id="tab-today" class="tab-pane active">
        <div id="day-summary" class="day-summary">
          <div class="day-summary-header">
            <div class="day-total">
              <span class="hours" id="day-hours">0.0</span><span class="goal" id="day-goal">/ 7h today</span>
            </div>
            <div class="day-pct" id="day-pct">0%</div>
          </div>
          <div class="day-progress">
            <div class="day-progress-fill" id="day-progress-fill"></div>
            <div class="day-progress-marker" id="day-progress-marker" title="7h"></div>
          </div>
          <div class="day-summary-footer" id="day-summary-footer"></div>
        </div>
        <div class="section-header">
          <h2>Your recent entries</h2>
        </div>
        <div id="entries-list" class="entries-list"></div>
      </section>

      <section id="tab-calendar" class="tab-pane">
        <div class="cal-header">
          <button id="cal-prev" class="btn ghost">◀</button>
          <h2 id="cal-title">—</h2>
          <button id="cal-next" class="btn ghost">▶</button>
        </div>
        <div class="cal-grid-labels">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span class="week-col">Week</span>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
        <div id="cal-day-detail" class="cal-day-detail hidden"></div>
      </section>

      <section id="tab-chart" class="tab-pane">
        <div class="section-header">
          <h2>Hours</h2>
          <select id="chart-range">
            <option value="week">Last 7 days</option>
            <option value="month" selected>Last 30 days</option>
            <option value="year">Last 12 months</option>
          </select>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-canvas"></canvas>
        </div>
        <div id="chart-summary" class="chart-summary"></div>
      </section>

      <section id="tab-export" class="tab-pane">
        <h2>Export CSV</h2>
        <p class="muted">Download a CSV of entries in the selected range.</p>
        <div class="export-form">
          <label>From <input type="date" id="export-from" /></label>
          <label>To <input type="date" id="export-to" /></label>
          <label>
            Who
            <select id="export-who">
              <option value="all">Everyone</option>
              <option value="me">Just me</option>
            </select>
          </label>
          <button id="export-btn" class="btn primary">Download CSV</button>
        </div>
      </section>
    </main>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Edit entry</h3>
      <form id="edit-form">
        <label>Project
          <select id="edit-project"></select>
        </label>
        <label>Note <input type="text" id="edit-task" placeholder="optional" /></label>
        <label>Started <input type="datetime-local" id="edit-started" required /></label>
        <label>Ended <input type="datetime-local" id="edit-ended" /></label>
        <div class="modal-actions">
          <button type="button" id="edit-delete" class="btn danger">Delete</button>
          <div class="spacer"></div>
          <button type="button" id="edit-cancel" class="btn ghost">Cancel</button>
          <button type="submit" class="btn primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="project-modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="project-modal-title">New project</h3>
      <form id="project-form">
        <label>Name <input type="text" id="project-name" required maxlength="60" /></label>
        <label>Color
          <div class="color-swatches" id="color-swatches"></div>
        </label>
        <div class="modal-actions">
          <button type="button" id="project-delete" class="btn danger hidden">Delete</button>
          <div class="spacer"></div>
          <button type="button" id="project-cancel" class="btn ghost">Cancel</button>
          <button type="submit" class="btn primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="user-color-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Your color</h3>
      <div class="color-swatches" id="user-color-swatches" style="margin-bottom:12px"></div>
      <label>Custom
        <input type="color" id="user-color-custom" />
      </label>
      <div class="modal-actions">
        <div class="spacer"></div>
        <button type="button" id="user-color-cancel" class="btn ghost">Cancel</button>
        <button type="button" id="user-color-save" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
