<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" stroke="#2dd4bf" stroke-width="1.5"/>

  <!-- Cardinal tick marks (square-cut, outside ring) -->
  <rect x="15" y="1"  width="2" height="3.5" fill="#2dd4bf"/>
  <rect x="27.5" y="15" width="3.5" height="2" fill="#2dd4bf"/>
  <rect x="15" y="27.5" width="2" height="3.5" fill="#2dd4bf"/>
  <rect x="1"  y="15" width="3.5" height="2" fill="#2dd4bf"/>

  <!-- Minor ticks at 45° intervals (small square dots) -->
  <rect x="23.5" y="3.8" width="1.5" height="1.5" fill="#2dd4bf" opacity="0.5"/>
  <rect x="26.7" y="23.5" width="1.5" height="1.5" fill="#2dd4bf" opacity="0.5"/>
  <rect x="3.8"  y="26.7" width="1.5" height="1.5" fill="#2dd4bf" opacity="0.5"/>
  <rect x="3.8"  y="3.8"  width="1.5" height="1.5" fill="#2dd4bf" opacity="0.5"/>

  <!-- Hour hand → ~10 o'clock, thick, square-cut -->
  <line x1="16" y1="16" x2="10" y2="11.5"
        stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Minute hand → 12 o'clock, thin, square-cut -->
  <line x1="16" y1="16" x2="16" y2="7"
        stroke="#2dd4bf" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Center pin (small square) -->
  <rect x="14.5" y="14.5" width="3" height="3" fill="#2dd4bf"/>
</svg>
